<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Page</title>
  </head>
  <body>
    <h2>Cek Cuaca</h2>
    <form action="" method="post">
      <input type="text" name="kota" placeholder="Masukan nama kota" />
      <button type="submit">Cek</button>
    </form>
    {% if kota %}
    <h3>Cuaca {{ kota }}</h3>
    <p>Suhu {{ suhu }}</p>
    <p>Deskripsi {{ deskripsi }}</p>
    {% endif %}
  </body>
</html>
